<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>MAG⚡ Gateway</title>

<style>
body {
    margin: 0;
    background: #0A0A0F;
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
}

/* TÍTULO */
h1 {
    font-size: 42px;
    margin-top: 60px;
    background: linear-gradient(90deg, #9945FF, #14F195);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* CARD */
.card {
    margin: 40px auto;
    padding: 30px;
    width: 90%;
    max-width: 600px;
    background: rgba(255,255,255,0.03);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 30px rgba(20,241,149,0.1);
}

/* STATUS */
.status {
    font-size: 22px;
    color: #14F195;
    margin: 20px 0;
}

/* HASH */
.hash {
    font-size: 14px;
    opacity: 0.7;
    word-break: break-all;
}

/* BOTÃO */
button {
    margin-top: 30px;
    padding: 15px 25px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    background: linear-gradient(90deg, #9945FF, #14F195);
    color: black;
    cursor: pointer;
}

/* FOOTER */
.footer {
    margin-top: 60px;
    opacity: 0.4;
    font-size: 12px;
}
</style>
</head>

<body>

<h1>MAG⚡ Gateway</h1>

<div class="card">

    <div class="status">✔ DOCUMENTO AUTÊNTICO</div>

    <p>Verificado via RGI Protocol</p>

    <div class="hash">
        HASH: 7f3a92c1a8b4e5d2c9f8a1e4d3b6c7a8e9f2c1d4b5a6f7e8d9c0a1b2c3d4e5f
    </div>

    <button onclick="alert('Validação executada via MAG⚡ RGI')">
        Verificar novamente
    </button>

</div>

<div class="footer">
    RGI — Registro Geral Imutável • Powered by MAG⚡
</div>

</body>
</html>
