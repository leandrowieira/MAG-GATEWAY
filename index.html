<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MAG⚡ Gateway</title>

<style>
body {
  margin: 0;
  background: #0A0A0F;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 60px 20px;
}

h1 {
  font-size: 42px;
  background: linear-gradient(90deg, #9945FF, #14F195);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.subtitle {
  opacity: 0.7;
  margin-bottom: 40px;
}

.box {
  max-width: 400px;
  margin: auto;
  padding: 30px;
  border-radius: 16px;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  box-shadow: 0 0 40px rgba(20, 241, 149, 0.15);
}

.status {
  color: #14F195;
  font-size: 24px;
  font-weight: bold;
}

.hash {
  margin-top: 15px;
  opacity: 0.6;
  font-size: 14px;
}

.network {
  margin-top: 10px;
  font-size: 14px;
  opacity: 0.8;
}

.footer {
  margin-top: 40px;
  font-size: 12px;
  opacity: 0.5;
}
</style>
</head>

<body>

<h1>MAG⚡ Gateway</h1>
<p class="subtitle">Verifiable Truth Layer</p>

<div class="box">
  <div class="status">✔ AUTHENTIC</div>
  <div class="hash">Hash: 0xA81F93BC...9C2D</div>
  <div class="network">Network: Solana</div>
</div>

<div class="footer">
  RGI — Immutable General Registry
</div>

</body>
</html>
